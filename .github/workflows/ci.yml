name: CI Pipeline
on:
  push:
    branches:  [main,develop]
  pull_request:
    branches:  [main]
jobs:
  tests:
    runs-on:  ubuntu-latest
    steps:
      - name:  checkout
        uses:  actions/checkout@v3
        
      - name:  Setup node.js
        uses:  actions/setup-node@v3
        with:
          node-version: '18'
      
      - name:  Run tests
        run:  node app.test.js
        
  build and push:
    runs-on:  ubuntu-latest
    needs:  test
    steps:
      - name:  checkout code
        uses:  actions/checkout@v3
        
      - name: login to docker
        uses: docker/login-action@v2
        with:
          username:  ${{ secrets.DOCKERHUB_USERNAME}}
          password:  ${{ secrets.DOCKERHUB_TOKEN}}
          
      - name:  Build and push Image
        uses:  docker/build-push-action@v4
        with:
          context:  .
          push:  true
          tags:  |
            bhargava209/jenkins-demo-app:gha-${{  github.run_number}}
            bhargava209/jenkins-demo-app:latest
            
      - name:  print success
        run:  |
          echo "Image Pushed successfully"
          echo "Tag: gha-${{github.run_number}}
          
    